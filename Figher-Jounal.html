<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>격투 & 스포츠 스마트 저널</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&family=Noto+Sans+KR:wght=300;400;500;700&display=swap');
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }
        /* 스크롤바 숨기기 (탭 메뉴용) */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-12">

    <!-- 상단 내비게이션 -->
    <header class="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-bold tracking-tight text-indigo-400">🥋 FIGHTER JOURNAL</h1>
            <div class="flex space-x-2">
                <input type="file" id="input-import" accept=".json" class="hidden">
                <button id="btn-import" class="bg-slate-800 hover:bg-slate-700 text-xs font-semibold py-1.5 px-3 rounded-lg border border-slate-700 transition text-emerald-400">
                    일지 불러오기 (복구)
                </button>
                <button id="btn-export" class="bg-slate-800 hover:bg-slate-700 text-xs font-semibold py-1.5 px-3 rounded-lg border border-slate-700 transition">
                    백업 (JSON 내보내기)
                </button>
            </div>
        </div>
    </header>

    <!-- 종목 관리 탭 섹션 -->
    <section class="max-w-4xl mx-auto px-4 mt-6">
        <div class="flex items-center space-x-2 border-b border-slate-800 pb-2 overflow-x-auto no-scrollbar">
            <!-- 동적으로 생성될 탭 공간 -->
            <div id="tab-container" class="flex space-x-2"></div>
            
            <!-- 새 탭 추가 버튼 -->
            <button id="btn-add-tab" class="bg-indigo-600/30 hover:bg-indigo-600 text-indigo-300 hover:text-white text-sm font-bold w-8 h-8 rounded-lg flex items-center justify-center transition shrink-0" title="종목 추가">
                +
            </button>
        </div>
    </section>

    <main class="max-w-4xl mx-auto px-4 mt-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- 왼쪽 사이드바: 작성 이력 -->
        <section class="md:col-span-1 bg-slate-950/50 p-4 rounded-xl border border-slate-800 h-[fit-content]">
            <h2 class="text-md font-bold mb-3 text-slate-400"><span id="current-tab-name-label" class="text-indigo-400">종목</span> 기록 목록</h2>
            <div id="journal-list" class="space-y-2 max-h-[400px] overflow-y-auto pr-1"></div>
        </section>

        <!-- 오른쪽 메인: 입력 폼 및 상세 보기 -->
        <section class="md:col-span-2 space-y-6">
            <form id="journal-form" class="bg-slate-950 p-6 rounded-xl border border-slate-800 space-y-6">
                <div class="flex justify-between items-center border-b border-slate-800 pb-4">
                    <h2 class="text-lg font-bold text-indigo-300"><span id="form-tab-title" class="text-white">종목</span> 일지 작성</h2>
                    <input type="date" id="input-date" class="bg-slate-800 text-slate-100 px-3 py-1.5 rounded-lg border border-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>

                <!-- 1. 2주 간 목표 -->
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">🎯 1. 2주 간 목표 (기술, 심리, 영양, 회복 등)</label>
                    <textarea id="target-goal" rows="2" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-3 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-slate-600" placeholder="예: 반대 폼 연습, 예비 동작 없애기, 공격 뒤차기"></textarea>
                </div>

                <!-- 2. 기술 디테일 및 솔루션 -->
                <div class="space-y-3 bg-slate-900/40 p-4 rounded-lg border border-slate-800">
                    <h3 class="text-sm font-bold text-indigo-400">🛠️ 2. 기술 디테일 & 솔루션</h3>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">목표 기술 / 수행 과제</label>
                        <input type="text" id="tech-target" class="w-full bg-slate-900 border border-slate-800 rounded-md p-2 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="예: 앞발 컷트 킥 후 뒤차기 카운터 / 클린 앤 저크 자세 연습">
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        <div class="col-span-2">
                            <label class="block text-xs text-slate-400 mb-1">시도한 기술 / 워크아웃 내용</label>
                            <input type="text" id="tech-tried" class="w-full bg-slate-900 border border-slate-800 rounded-md p-2 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="실제 수행 정황 또는 세트 수 기록">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">결과</label>
                            <select id="tech-result" class="w-full bg-slate-900 border border-slate-800 rounded-md p-2 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                <option value="성공">성공 🟢</option>
                                <option value="일부 성공">일부 성공 🟡</option>
                                <option value="실패">실패 🔴</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">피드백 및 오답 노트</label>
                        <textarea id="tech-feedback" rows="2" class="w-full bg-slate-900 border border-slate-800 rounded-md p-2 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-slate-600" placeholder="수정할 디테일이나 느낀 점을 상세히 기록"></textarea>
                    </div>
                </div>

                <!-- 3. 매치업/세션 노트 -->
                <div class="space-y-3 bg-slate-900/40 p-4 rounded-lg border border-slate-800">
                    <h3 class="text-sm font-bold text-indigo-400">👥 3. 매치업/트레이닝 파트너 노트</h3>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">상대방/파트너 분석 (스타일, 배울 점, 약점 등)</label>
                        <input type="text" id="match-opponent" class="w-full bg-slate-900 border border-slate-800 rounded-md p-2 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="예: 김민수 / 빠른 스텝 앤 고, 템포 조절이 훌륭함">
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">나의 대응/수행 전략 ①</label>
                            <input type="text" id="match-sol1" class="w-full bg-slate-900 border border-slate-800 rounded-md p-2 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="스텝으로 각도 벌리기 등">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">나의 대응/수행 전략 ② (플랜 B)</label>
                            <input type="text" id="match-sol2" class="w-full bg-slate-900 border border-slate-800 rounded-md p-2 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="막혔을 때 연계 플레이">
                        </div>
                    </div>
                </div>

                <!-- 4. 심리적 상태 -->
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 bg-slate-900/40 p-4 rounded-lg border border-slate-800">
                    <div class="sm:col-span-1">
                        <label class="block text-xs text-slate-400 mb-1">🧠 4. 집중도 (1-5점)</label>
                        <input type="range" id="mental-focus" min="1" max="5" value="3" class="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-indigo-500 mt-3">
                        <div class="flex justify-between text-xs text-slate-500 px-1 mt-2">
                            <span>낮음</span>
                            <span id="focus-val" class="text-indigo-400 font-bold">3점</span>
                            <span>최상</span>
                        </div>
                    </div>
                    <div class="sm:col-span-2">
                        <label class="block text-xs text-slate-400 mb-1">스트레스 및 컨디션 요인</label>
                        <input type="text" id="mental-stress" class="w-full bg-slate-900 border border-slate-800 rounded-md p-2 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="예: 체중 감량 압박, 수면 부족 등">
                    </div>
                </div>

                <!-- 5. 부상 관리 -->
                <div class="space-y-3 bg-slate-900/40 p-4 rounded-lg border border-slate-800">
                    <h3 class="text-sm font-bold text-red-400">🩹 5. 부상 및 신체 상태 관리</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">통증 부위 및 양상</label>
                            <input type="text" id="injury-pain" class="w-full bg-slate-900 border border-slate-800 rounded-md p-2 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="예: 오른 손목 젖힐 때 시큰거림">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">대처 처치 및 가동성 운동</label>
                            <input type="text" id="injury-treatment" class="w-full bg-slate-900 border border-slate-800 rounded-md p-2 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="예: 온찜질 및 손목 보대 착용">
                        </div>
                    </div>
                </div>

                <!-- 저장 버튼 -->
                <div class="flex space-x-3 justify-end pt-2">
                    <button type="button" id="btn-new" class="bg-slate-800 hover:bg-slate-700 text-sm font-semibold py-2 px-5 rounded-lg border border-slate-700 transition">새로 작성</button>
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-sm font-semibold py-2 px-6 rounded-lg transition">일지 저장</button>
                </div>
            </form>
        </section>
    </main>

    <script>
        const form = document.getElementById('journal-form');
        const dateInput = document.getElementById('input-date');
        const focusInput = document.getElementById('mental-focus');
        const focusVal = document.getElementById('focus-val');
        const journalList = document.getElementById('journal-list');
        const btnNew = document.getElementById('btn-new');
        const btnExport = document.getElementById('btn-export');
        const btnImport = document.getElementById('btn-import');
        const inputImport = document.getElementById('input-import');
        const tabContainer = document.getElementById('tab-container');
        const btnAddTab = document.getElementById('btn-add-tab');
        const currentTabLabel = document.getElementById('current-tab-name-label');
        const formTabTitle = document.getElementById('form-tab-title');

        const today = new Date().toISOString().split('T')[0];
        dateInput.value = today;

        focusInput.addEventListener('input', (e) => {
            focusVal.textContent = `${e.target.value}점`;
        });

        // 데이터 구조 초기화
        // tabs: ['태권도', '크로스핏']
        // activeTab: '태권도'
        // logs: [{category: '태권도', date: '2026-07-14', ...}]
        let tabs = JSON.parse(localStorage.getItem('fighter_tabs')) || ['일반'];
        let activeTab = localStorage.getItem('fighter_active_tab') || tabs[0];
        let logs = JSON.parse(localStorage.getItem('fighter_logs')) || [];

        // 데이터 동기화 유지 보장
        if (!tabs.includes(activeTab)) {
            activeTab = tabs[0] || '일반';
            if (tabs.length === 0) tabs = ['일반'];
        }

        function saveToStorage() {
            localStorage.setItem('fighter_tabs', JSON.stringify(tabs));
            localStorage.setItem('fighter_active_tab', activeTab);
            localStorage.setItem('fighter_logs', JSON.stringify(logs));
        }

        // 탭 바 렌더링
        function renderTabs() {
            tabContainer.innerHTML = '';
            tabs.forEach(tab => {
                const isActive = tab === activeTab;
                const tabEl = document.createElement('div');
                tabEl.className = `flex items-center space-x-1.5 py-1.5 px-3.5 rounded-lg border text-sm font-semibold transition cursor-pointer shrink-0 ${
                    isActive 
                    ? 'bg-indigo-600 border-indigo-500 text-white' 
                    : 'bg-slate-950 border-slate-800 text-slate-400 hover:border-slate-700 hover:text-slate-200'
                }`;
                
                // 탭 텍스트 클릭 시 전환
                const textSpan = document.createElement('span');
                textSpan.textContent = tab;
                textSpan.addEventListener('click', () => {
                    activeTab = tab;
                    saveToStorage();
                    renderTabs();
                    renderList();
                    btnNew.click(); // 탭 전환 시 폼 초기화
                });
                tabEl.appendChild(textSpan);

                // 삭제 버튼 (기본 '일반' 탭이거나 탭이 한 개만 남았을 때는 삭제 버튼 미노출)
                if (tabs.length > 1) {
                    const deleteBtn = document.createElement('button');
                    deleteBtn.innerHTML = '&times;';
                    deleteBtn.className = 'ml-1 text-xs text-slate-400 hover:text-red-400 font-bold focus:outline-none transition px-0.5';
                    deleteBtn.addEventListener('click', (e) => {
                        e.stopPropagation(); // 탭 클릭 이벤트 전파 방지
                        if (confirm(`'${tab}' 탭을 삭제하시겠습니까?\n이 종목의 모든 일지 데이터가 함께 삭제됩니다.`)) {
                            // 일지 데이터에서 해당 종목 로그 필터 아웃
                            logs = logs.filter(log => log.category !== tab);
                            // 탭 배열에서 제거
                            tabs = tabs.filter(t => t !== tab);
                            
                            if (activeTab === tab) {
                                activeTab = tabs[0];
                            }
                            saveToStorage();
                            renderTabs();
                            renderList();
                            btnNew.click();
                        }
                    });
                    tabEl.appendChild(deleteBtn);
                }

                tabContainer.appendChild(tabEl);
            });

            currentTabLabel.textContent = activeTab;
            formTabTitle.textContent = `[${activeTab}]`;
        }

        // 새 탭 추가 클릭 핸들러
        btnAddTab.addEventListener('click', () => {
            const newTabName = prompt('새로운 운동 종목명을 입력해주세요:');
            if (!newTabName) return;
            const trimmed = newTabName.trim();
            if (trimmed === '') return;
            if (tabs.includes(trimmed)) {
                alert('이미 존재하는 종목명입니다.');
                return;
            }
            tabs.push(trimmed);
            activeTab = trimmed;
            saveToStorage();
            renderTabs();
            renderList();
            btnNew.click();
        });

        // 일지 목록 렌더링 (선택된 종목 탭 기준 필터링)
        function renderList() {
            journalList.innerHTML = '';
            
            // 현재 탭에 해당하는 로그 필터링
            const currentLogs = logs.filter(log => (log.category || '일반') === activeTab);

            if (currentLogs.length === 0) {
                journalList.innerHTML = `<p class="text-xs text-slate-600 py-4 text-center">'${activeTab}' 종목에 작성된 일지가 없습니다.</p>`;
                return;
            }

            const sortedLogs = [...currentLogs].sort((a, b) => new Date(b.date) - new Date(a.date));
            sortedLogs.forEach(log => {
                const item = document.createElement('div');
                item.className = 'p-3 rounded-lg bg-slate-900 border border-slate-800 hover:border-indigo-500 transition cursor-pointer text-left';
                item.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-slate-300">${log.date}</span>
                        <span class="text-[10px] px-1.5 py-0.5 rounded bg-slate-800 text-indigo-400 font-semibold">${log.techResult || '기록'}</span>
                    </div>
                    <p class="text-xs text-slate-400 mt-1 truncate">${log.techTarget || '트레이닝 세션'}</p>
                `;
                item.addEventListener('click', () => loadLog(log.date));
                journalList.appendChild(item);
            });
        }

        // 일지 저장 핸들러
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const date = dateInput.value;
            const newLog = {
                category: activeTab, // 현재 종목 분류 추가 저장
                date,
                targetGoal: document.getElementById('target-goal').value,
                techTarget: document.getElementById('tech-target').value,
                techTried: document.getElementById('tech-tried').value,
                techResult: document.getElementById('tech-result').value,
                techFeedback: document.getElementById('tech-feedback').value,
                matchOpponent: document.getElementById('match-opponent').value,
                matchSol1: document.getElementById('match-sol1').value,
                matchSol2: document.getElementById('match-sol2').value,
                mentalFocus: focusInput.value,
                mentalStress: document.getElementById('mental-stress').value,
                injuryPain: document.getElementById('injury-pain').value,
                injuryTreatment: document.getElementById('injury-treatment').value
            };

            // 동일한 날짜 + 동일 종목인 로그가 있는지 판정
            const existingIndex = logs.findIndex(log => log.date === date && (log.category || '일반') === activeTab);
            if (existingIndex > -1) {
                logs[existingIndex] = newLog;
            } else {
                logs.push(newLog);
            }

            saveToStorage();
            alert(`[${activeTab}] 일지가 저장되었습니다!`);
            renderList();
        });

        // 클릭된 일지 불러오기
        function loadLog(date) {
            const log = logs.find(l => l.date === date && (l.category || '일반') === activeTab);
            if (!log) return;
            dateInput.value = log.date;
            document.getElementById('target-goal').value = log.targetGoal || '';
            document.getElementById('tech-target').value = log.techTarget || '';
            document.getElementById('tech-tried').value = log.techTried || '';
            document.getElementById('tech-result').value = log.techResult || '성공';
            document.getElementById('tech-feedback').value = log.techFeedback || '';
            document.getElementById('match-opponent').value = log.matchOpponent || '';
            document.getElementById('match-sol1').value = log.matchSol1 || '';
            document.getElementById('match-sol2').value = log.matchSol2 || '';
            focusInput.value = log.mentalFocus || 3;
            focusVal.textContent = `${focusInput.value}점`;
            document.getElementById('mental-stress').value = log.mentalStress || '';
            document.getElementById('injury-pain').value = log.injuryPain || '';
            document.getElementById('injury-treatment').value = log.injuryTreatment || '';
        }

        // 새 일지 작성 버튼 초기화
        btnNew.addEventListener('click', () => {
            form.reset();
            dateInput.value = today;
            focusVal.textContent = '3점';
        });

        // 내보내기 (통합 백업 - 탭 구성 정보와 일지를 하나의 파일로 묶어서 저장)
        btnExport.addEventListener('click', () => {
            if (logs.length === 0 && tabs.length <= 1) {
                alert('내보낼 데이터가 없습니다.');
                return;
            }
            const backupData = {
                tabs: tabs,
                logs: logs
            };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupData, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `fighter_journal_backup_${today}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        });

        // 불러오기 연동
        btnImport.addEventListener('click', () => {
            inputImport.click();
        });

        // 복구 처리
        inputImport.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const importedData = JSON.parse(event.target.result);
                    
                    // 신규 통합 백업 형식인지, 구버전 로그 단일 배열 형식인지 가려서 처리
                    if (importedData.tabs && Array.isArray(importedData.logs)) {
                        // 1. 신규 템플릿 복구
                        tabs = importedData.tabs;
                        logs = importedData.logs;
                        activeTab = tabs[0] || '일반';
                    } else if (Array.isArray(importedData)) {
                        // 2. 구버전 로그만 들어있는 백업 파일 호환 처리
                        logs = importedData;
                        // 기존 로그들의 카테고리(종목) 파악해 탭 자동 복구
                        const extractedTabs = Array.from(new Set(logs.map(log => log.category || '일반')));
                        tabs = extractedTabs.length > 0 ? extractedTabs : ['일반'];
                        activeTab = tabs[0];
                    } else {
                        alert('올바른 파일 양식이 아닙니다.');
                        return;
                    }
                    
                    saveToStorage();
                    alert('종목 구성과 일지 데이터를 성공적으로 불러왔습니다!');
                    renderTabs();
                    renderList();
                    btnNew.click();
                } catch (err) {
                    alert('파일을 가져오는 과정에 오류가 발생했습니다. 올바른 JSON 파일인지 확인해주세요.');
                }
            };
            reader.readAsText(file);
        });

        // 최초 실행
        renderTabs();
        renderList();
    </script>
</body>
</html>
